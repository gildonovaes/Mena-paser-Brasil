<script>
    const indicator = document.getElementById('scroll-indicator');

    function updateArrowVisibility() {
        if (window.scrollY < 20) {
            indicator.style.opacity = "1";
            indicator.style.pointerEvents = "auto";
            indicator.style.transform = "translateX(-50%) translateY(0)";
        } else {
            indicator.style.opacity = "0";
            indicator.style.pointerEvents = "none";
            indicator.style.transform = "translateX(-50%) translateY(20px)";
        }
    }

    window.addEventListener('scroll', updateArrowVisibility);
    window.addEventListener('focus', updateArrowVisibility);
    updateArrowVisibility();

    function openZoom(imgSrc) {
        document.getElementById('zoomed-image').src = imgSrc;
        document.getElementById('image-overlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
        document.getElementById('image-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
